name: github-stats

on:
  schedule:
    - cron: "25 3,5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      GITHUB_STATS_CSV: stats/github.csv
      GITHUB_REPOS: bavix/gripmock,tokopedia/gripmock
      GITHUB_SVG_DIR: svg
      GITHUB_SVG_PREFIX: github
      GITHUB_CHART_TITLE: GripMock GitHub Metrics
      GITHUB_CHART_COLORS: bavix/gripmock=#34d399,#059669;tokopedia/gripmock=#f59e0b,#d97706
      GITHUB_SOURCE_URL: https://github.com/bavix/artifact-stats/blob/master/stats/github.csv

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Collect GitHub stats
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python3 collect_github_stats.py --output "$GITHUB_STATS_CSV" --repos "$GITHUB_REPOS"

      - name: Generate GitHub SVGs
        run: python3 generate_github_charts.py --input "$GITHUB_STATS_CSV" --output-dir "$GITHUB_SVG_DIR" --output-prefix "$GITHUB_SVG_PREFIX" --title "$GITHUB_CHART_TITLE" --source-label "$GITHUB_SOURCE_URL" --colors "$GITHUB_CHART_COLORS"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_BOT }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: ${{ secrets.GPG_FINGERPRINT }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_committer_name: Github bot
          git_committer_email: bot@babichev.net

      - name: Commit changes
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          set -euo pipefail

          git add "$GITHUB_STATS_CSV" "$GITHUB_SVG_DIR/$GITHUB_SVG_PREFIX-stars.svg" "$GITHUB_SVG_DIR/$GITHUB_SVG_PREFIX-forks.svg"

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -S -m "chore(stats): update github stats"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: git push
