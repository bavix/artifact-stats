name: dockerhub-stats

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production

    steps:
      - uses: actions/checkout@v6

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Collect Docker Hub stats
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PAT: ${{ secrets.DOCKERHUB_PAT }}
          DOCKERHUB_REPOS: "bavix/gripmock,tkpd/gripmock"
        shell: bash
        run: |
          set -euo pipefail

          API="https://hub.docker.com/v2"
          OUT="stats/dockerhub.csv"

          mkdir -p "$(dirname "$OUT")"

          if [[ ! -f "$OUT" ]]; then
            echo "ts,repo,pull_count,star_count,last_updated" > "$OUT"
          fi

          token=""
          if [[ -n "${DOCKERHUB_USERNAME:-}" && -n "${DOCKERHUB_PAT:-}" ]]; then
            token="$(
              curl -fsS \
                -H 'Content-Type: application/json' \
                -d "{\"identifier\":\"$DOCKERHUB_USERNAME\",\"secret\":\"$DOCKERHUB_PAT\"}" \
                "$API/auth/token" | jq -r '.access_token'
            )"
          fi

          auth_args=()
          if [[ -n "$token" && "$token" != "null" ]]; then
            auth_args=(-H "Authorization: Bearer $token")
          fi

          IFS=',' read -r -a repos <<< "${DOCKERHUB_REPOS:?DOCKERHUB_REPOS is required}"
          today="$(date -u +%Y-%m-%d)"
          now="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          for full in "${repos[@]}"; do
            repo="$(echo "$full" | xargs)"
            [[ -z "$repo" ]] && continue

            ns="${repo%%/*}"
            name="${repo#*/}"

            json="$(
              curl -fsS \
                "${auth_args[@]}" \
                "$API/namespaces/$ns/repositories/$name"
            )"

            pull_count="$(jq -r '.pull_count // 0' <<< "$json")"
            star_count="$(jq -r '.star_count // 0' <<< "$json")"
            created_at="$(jq -r '.date_registered // empty' <<< "$json")"
            last_updated="$(jq -r '.last_updated // ""' <<< "$json")"

            # если по репе ещё нет записей — добавляем стартовую точку
            if ! awk -F, -v repo="$repo" 'NR > 1 && $2 == repo { found=1; exit } END { exit !found }' "$OUT"; then
              if [[ -n "$created_at" ]]; then
                echo "$created_at,$repo,0,0," >> "$OUT"
              fi
            fi

            # если за сегодня по этой репе уже есть запись — пропускаем
            if awk -F, -v repo="$repo" -v today="$today" '
              NR > 1 && $2 == repo && index($1, today) == 1 { found=1; exit }
              END { exit !found }
            ' "$OUT"; then
              echo "Skip duplicate for $repo on $today"
              continue
            fi

            echo "$now,$repo,$pull_count,$star_count,$last_updated" >> "$OUT"
          done

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_BOT }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: ${{ secrets.GPG_FINGERPRINT }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_committer_name: Github bot
          git_committer_email: bot@babichev.net

      - name: Commit changes
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          set -euo pipefail

          git add stats/dockerhub.csv

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -S -m "chore(stats): update dockerhub stats"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: git push
