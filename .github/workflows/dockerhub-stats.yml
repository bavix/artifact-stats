name: dockerhub-stats

on:
  schedule:
    - cron: "55 2,4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production
      STATS_CSV: stats/dockerhub.csv
      STATS_SVG: svg/gripmock-downloads.svg
      DOCKERHUB_REPOS: bavix/gripmock,tkpd/gripmock
      DOCKERHUB_CHART_TITLE: GripMock Docker Hub Downloads
      DOCKERHUB_CHART_COLORS: bavix/gripmock=#34d399,#059669;tkpd/gripmock=#f59e0b,#d97706
      DOCKERHUB_SOURCE_URL: https://github.com/bavix/artifact-stats/blob/master/stats/dockerhub.csv

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Collect Docker Hub stats
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PAT: ${{ secrets.DOCKERHUB_PAT }}
        run: python3 collect_dockerhub_stats.py --output "$STATS_CSV" --repos "$DOCKERHUB_REPOS"

      - name: Generate Docker Hub SVG
        run: python3 generate_dockerhub_chart.py --input "$STATS_CSV" --output "$STATS_SVG" --title "$DOCKERHUB_CHART_TITLE" --source-label "$DOCKERHUB_SOURCE_URL" --colors "$DOCKERHUB_CHART_COLORS"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_BOT }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: ${{ secrets.GPG_FINGERPRINT }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_committer_name: Github bot
          git_committer_email: bot@babichev.net

      - name: Commit changes
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          set -euo pipefail

          git add "$STATS_CSV" "$STATS_SVG"

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -S -m "chore(stats): update dockerhub stats"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: git push
