name: weekly

on:
  schedule:
    - cron: "40 6 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest

    env:
      WEEKLY_MD: WEEKLY.md
      GITHUB_CSV: stats/github.csv
      DOCKER_CSV: stats/dockerhub.csv

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build weekly report
        run: python3 weekly_log.py --github "$GITHUB_CSV" --docker "$DOCKER_CSV" --output "$WEEKLY_MD"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_BOT }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: ${{ secrets.GPG_FINGERPRINT }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_committer_name: Github bot
          git_committer_email: bot@babichev.net

      - name: Commit changes
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          set -euo pipefail

          git add "$WEEKLY_MD"

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -S -m "chore(stats): update weekly report"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: git push
